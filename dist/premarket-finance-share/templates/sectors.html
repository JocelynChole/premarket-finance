<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>板块推演 · {{ project_name }}</title>
  <meta name="description" content="按板块归类今日预测类资讯，识别机构共识与情绪倾向">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="/">
        <span class="brand__mark">P</span>
        <span class="brand__text">
          <span class="brand__name">盘前速览</span>
          <span class="brand__edition">Premarket Dispatch · v{{ project_version }}</span>
        </span>
      </a>
      <nav class="nav">
        <a href="/">速览</a>
        <a href="/report">简报</a>
        <a href="/sectors" class="is-active">板块</a>
        <a href="/history">档案</a>
        <a href="/subscribe">订阅</a>
      </nav>
      <div class="clock">
        <span class="clock__dot"></span>
        <span id="liveClock">--:--:--</span>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="hero">
      <div class="hero__kicker">SECTOR BREAKDOWN</div>
      <h1 class="hero__title">板块 <em>推演</em></h1>
      <p class="hero__sub">按板块归类今日预测类资讯，识别 <strong>机构共识</strong> 与 <strong>情绪倾向</strong>，为您的板块配置提供参考。</p>
    </section>

    <section class="section">
      <div id="sectorGrid" class="sector-cards">
        <div class="loading"><div class="spinner"></div><div>加载板块数据…</div></div>
      </div>
    </section>
  </main>

  <footer class="foot shell">
    <div class="foot__brand">PREMARKET DISPATCH · {{ project_version }}</div>
    <div class="foot__links">
      <a href="/">返回速览</a> ·
      <span style="color: var(--ink-3);">不构成投资建议</span>
    </div>
  </footer>

  <script>
    function pad(n){return n.toString().padStart(2,'0');}
    function tick(){
      const n=new Date();
      document.getElementById('liveClock').textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
    }
    setInterval(tick,1000); tick();
  </script>
  <script>
    function escapeHtml(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
    async function loadSectors() {
      const c = document.getElementById('sectorGrid');
      try {
        const resp = await fetch('/api/news');
        const data = await resp.json();
        if (!data.news_list || data.news_list.length === 0) {
          c.innerHTML = `<div class="empty" style="grid-column: 1/-1;"><span class="empty__icon">∅</span><div class="empty__title">暂无数据</div><div class="empty__sub">请到首页点击「立即刷新」</div></div>`;
          return;
        }
        const sectorMap = {};
        data.news_list.forEach(n => (n.sectors || []).forEach(s => {
          if (s === '其他') return;
          if (!sectorMap[s]) sectorMap[s] = [];
          sectorMap[s].push(n);
        }));
        const ordered = Object.entries(sectorMap).sort((a, b) => b[1].length - a[1].length);
        if (ordered.length === 0) {
          c.innerHTML = `<div class="empty" style="grid-column: 1/-1;"><span class="empty__icon">∅</span><div class="empty__title">今日无板块归属</div></div>`;
          return;
        }
        const palette = ['#c9a86a', '#4a8b6f', '#d49b3b', '#6b7b8c', '#9b9aa3', '#5a6072'];
        c.innerHTML = ordered.map(([sector, list], i) => {
          const bullish = list.filter(n => n.sentiment === '利好').length;
          const bearish = list.filter(n => n.sentiment === '利空').length;
          const direction = bullish > bearish ? '利好' : bearish > bullish ? '利空' : '中性';
          const dColor = direction === '利好' ? 'var(--bull)' : direction === '利空' ? 'var(--bear)' : 'var(--neutral)';
          const topNews = list.filter(n => n.title).slice(0, 3);
          return `
            <div class="sector-card" style="--sector-color: ${palette[i % palette.length]};">
              <div class="sector-card__name">${escapeHtml(sector)}</div>
              <div class="sector-card__count">${list.length}</div>
              <div class="sector-card__sub" style="color: ${dColor};">${direction} · 利好${bullish} / 利空${bearish}</div>
              ${topNews.length > 0 ? `<ul class="sector-card__news no-bullets">
                ${topNews.map(n => `<li>· ${escapeHtml(n.title.substring(0, 24))}${n.title.length > 24 ? '…' : ''}</li>`).join('')}
              </ul>` : ''}
            </div>
          `;
        }).join('');
      } catch (e) {
        c.innerHTML = `<div class="empty" style="grid-column: 1/-1;"><span class="empty__icon">!</span><div class="empty__title">加载失败</div><div class="empty__sub">${e.message}</div></div>`;
      }
    }
    loadSectors();
  </script>
</body>
</html>
