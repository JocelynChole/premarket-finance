<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>完整简报 · {{ project_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="/">
        <span class="brand__mark">P</span>
        <span class="brand__text">
          <span class="brand__name">盘前速览</span>
          <span class="brand__edition">Premarket Dispatch · v{{ project_version }}</span>
        </span>
      </a>
      <nav class="nav">
        <a href="/">速览</a>
        <a href="/report" class="is-active">简报</a>
        <a href="/sectors">板块</a>
        <a href="/history">档案</a>
        <a href="/subscribe">订阅</a>
      </nav>
      <div class="clock">
        <span class="clock__dot"></span>
        <span id="liveClock">--:--:--</span>
        <span id="liveDate">--</span>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="hero">
      <div class="hero__kicker">FULL DISPATCH · MARKDOWN</div>
      <h1 class="hero__title">今日 <em>完整简报</em></h1>
      <p class="hero__sub">按 <strong>output_spec.md</strong> 模板生成的标准 Markdown 报告，包含 5 个区块：核心预判 / 热点板块 / 关键资讯 / 因变量参考 / 风险提示。</p>
      <div class="hero__meta">
        <span>生成于 <span id="reportTime">—</span></span>
        <span>· <a href="/api/report/today" target="_blank" class="text-gold">查看原始 Markdown</a></span>
        <span>· <button id="btnRefresh" class="btn btn--ghost btn--sm">↻ 重新生成</button></span>
      </div>
    </section>

    <section class="section">
      <div id="mdContainer">
        <div class="loading"><div class="spinner"></div><div>正在加载简报…</div></div>
      </div>
    </section>
  </main>

  <footer class="foot shell">
    <div class="foot__brand">PREMARKET DISPATCH · {{ project_version }}</div>
    <div class="foot__links">
      <a href="/">返回速览</a> ·
      <a href="/subscribe">微信订阅</a> ·
      <span style="color: var(--ink-3);">不构成投资建议</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="{{ url_for('static', filename='js/report.js') }}"></script>
  <script>
    // 时钟
    function pad(n){return n.toString().padStart(2,'0');}
    function tick(){
      const n=new Date();
      document.getElementById('liveClock').textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
      document.getElementById('liveDate').textContent=`${n.getFullYear()}/${pad(n.getMonth()+1)}/${pad(n.getDate())}`;
    }
    setInterval(tick,1000); tick();
  </script>
</body>
</html>
