<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>历史档案 · {{ project_name }}</title>
  <meta name="description" content="所有历史简报按日期归档，点击任一日期可回看当日完整分析报告">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="/">
        <span class="brand__mark">P</span>
        <span class="brand__text">
          <span class="brand__name">盘前速览</span>
          <span class="brand__edition">Premarket Dispatch · v{{ project_version }}</span>
        </span>
      </a>
      <nav class="nav">
        <a href="/">速览</a>
        <a href="/report">简报</a>
        <a href="/sectors">板块</a>
        <a href="/history" class="is-active">档案</a>
        <a href="/subscribe">订阅</a>
      </nav>
      <div class="clock">
        <span class="clock__dot"></span>
        <span id="liveClock">--:--:--</span>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="hero">
      <div class="hero__kicker">ARCHIVE</div>
      <h1 class="hero__title">历史 <em>档案</em></h1>
      <p class="hero__sub">所有历史简报按日期归档，点击任一日期可回看当日完整分析报告。</p>
    </section>

    <section class="section">
      <div class="section__head">
        <div class="section__head-left">
          <span class="section__no">§01</span>
          <h2 class="section__title">时间 <em>线</em></h2>
        </div>
      </div>
      <div id="timelineWrap" style="max-width: 720px;">
        <div class="loading"><div class="spinner"></div><div>加载历史档案…</div></div>
      </div>
    </section>
  </main>

  <footer class="foot shell">
    <div class="foot__brand">PREMARKET DISPATCH · {{ project_version }}</div>
    <div class="foot__links">
      <a href="/">返回速览</a> ·
      <span style="color: var(--ink-3);">不构成投资建议</span>
    </div>
  </footer>

  <script>
    function pad(n){return n.toString().padStart(2,'0');}
    function tick(){
      const n=new Date();
      document.getElementById('liveClock').textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
    }
    setInterval(tick,1000); tick();
  </script>
  <script>
    function escapeHtml(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
    async function loadHistory() {
      const c = document.getElementById('timelineWrap');
      const userSendkey = localStorage.getItem('pms_sendkey') || '';
      try {
        const [histResp, pushResp] = await Promise.all([
          fetch('/api/history'),
          userSendkey ? fetch(`/api/my-pushes?sendkey=${encodeURIComponent(userSendkey)}`) : Promise.resolve(null)
        ]);
        const items = await histResp.json();
        const pushes = pushResp ? await pushResp.json() : [];

        let html = '';

        // 令牌方案：我的推送记录
        if (pushes && pushes.length > 0) {
          html += `<div style="margin-bottom: 32px;">
            <div style="font-size: 13px; color: var(--gold, #c9a86a); margin-bottom: 12px; letter-spacing: 0.05em;">📌 我的推送记录</div>
            <div class="timeline">
              ${pushes.map(p => `
                <div class="timeline__item" style="text-decoration: none; color: inherit; display: block;">
                  <span class="timeline__date">${escapeHtml(p.date)}</span>
                  <span class="timeline__sub">${p.success ? '✅' : '❌'} ${escapeHtml(String(p.news_count))} 条 · ${escapeHtml(p.sectors.join(' · '))}</span>
                </div>
              `).join('')}
            </div>
          </div>`;
        }

        // 全部历史档案
        if (!items.length) {
          html += '<div class="empty"><span class="empty__icon">∅</span><div class="empty__title">暂无历史报告</div><div class="empty__sub">完成至少一次抓取后，历史报告会自动归档到这里</div></div>';
        } else {
          html += '<div class="timeline">' + items.map(item => `
            <a class="timeline__item" href="/api/report/date/${item.date}/markdown" target="_blank" style="text-decoration: none; color: inherit; display: block;">
              <span class="timeline__date">${escapeHtml(item.formatted_date.replace(/-/g, ' · '))}</span>
              <span class="timeline__sub">DISPATCH №${escapeHtml(item.date)} · ${escapeHtml(String(Math.round(item.size / 1024)))} KB</span>
            </a>
          `).join('') + '</div>';
        }

        c.innerHTML = html;
      } catch (e) {
        c.innerHTML = `<div class="empty"><span class="empty__icon">!</span><div class="empty__title">加载失败</div></div>`;
      }
    }
    loadHistory();
  </script>
</body>
</html>
