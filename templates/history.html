<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>历史档案 · {{ project_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="/">
        <span class="brand__mark">P</span>
        <span class="brand__text">
          <span class="brand__name">盘前速览</span>
          <span class="brand__edition">Premarket Dispatch · v{{ project_version }}</span>
        </span>
      </a>
      <nav class="nav">
        <a href="/">速览</a>
        <a href="/report">简报</a>
        <a href="/sectors">板块</a>
        <a href="/history" class="is-active">档案</a>
        <a href="/subscribe">订阅</a>
      </nav>
      <div class="clock">
        <span class="clock__dot"></span>
        <span id="liveClock">--:--:--</span>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="hero">
      <div class="hero__kicker">ARCHIVE</div>
      <h1 class="hero__title">历史 <em>档案</em></h1>
      <p class="hero__sub">所有历史简报按日期归档，点击任一日期可回看当日完整分析报告。</p>
    </section>

    <section class="section">
      <div class="section__head">
        <div class="section__head-left">
          <span class="section__no">§01</span>
          <h2 class="section__title">时间 <em>线</em></h2>
        </div>
      </div>
      <div id="timelineWrap" style="max-width: 720px;">
        <div class="loading"><div class="spinner"></div><div>加载历史档案…</div></div>
      </div>
    </section>
  </main>

  <footer class="foot shell">
    <div class="foot__brand">PREMARKET DISPATCH · {{ project_version }}</div>
    <div class="foot__links">
      <a href="/">返回速览</a> ·
      <span style="color: var(--ink-3);">不构成投资建议</span>
    </div>
  </footer>

  <script>
    function pad(n){return n.toString().padStart(2,'0');}
    function tick(){
      const n=new Date();
      document.getElementById('liveClock').textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
    }
    setInterval(tick,1000); tick();
  </script>
  <script>
    async function loadHistory() {
      const c = document.getElementById('timelineWrap');
      try {
        const resp = await fetch('/api/history');
        const items = await resp.json();
        if (!items.length) {
          c.innerHTML = '<div class="empty"><span class="empty__icon">∅</span><div class="empty__title">暂无历史报告</div><div class="empty__sub">完成至少一次抓取后，历史报告会自动归档到这里</div></div>';
          return;
        }
        c.innerHTML = '<div class="timeline">' + items.map(item => `
          <a class="timeline__item" href="/api/report/date/${item.date}/markdown" target="_blank" style="text-decoration: none; color: inherit; display: block;">
            <span class="timeline__date">${item.formatted_date.replace(/-/g, ' · ')}</span>
            <span class="timeline__sub">DISPATCH №${item.date} · ${Math.round(item.size / 1024)} KB</span>
          </a>
        `).join('') + '</div>';
      } catch (e) {
        c.innerHTML = `<div class="empty"><span class="empty__icon">!</span><div class="empty__title">加载失败</div></div>`;
      }
    }
    loadHistory();
  </script>
</body>
</html>
